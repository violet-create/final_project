<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밸런스 게임 앱</title>
    <style>
        /* Slide 23 - CSS 스타일링 */
        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f6fa;
        }

        .game-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }

        .options {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
        }

        .option-btn {
            padding: 40px 32px;
            font-size: 18px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            flex: 1;
            transition: transform 0.2s;
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        .option-a { background-color: #e74c3c; color: white; }
        .option-b { background-color: #3498db; color: white; }

        .vs-text {
            font-weight: bold;
            color: #7f8c8d;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f1f2f6;
            border-radius: 10px;
            font-weight: bold;
        }

        .next-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>밸런스 게임</h1>
        <p id="question-text">질문이 여기에 표시됩니다</p>
        
        <div class="options">
            <button id="btn-a" class="option-btn option-a">선택지 A</button>
            <span class="vs-text">VS</span>
            <button id="btn-b" class="option-btn option-b">선택지 B</button>
        </div>

        <div id="result" class="result hidden"></div>
        <button id="next-btn" class="next-btn hidden">다음 질문</button>
    </div>

    <script>
        /* Slide 22 - 데이터 구조 */
        const questions = [
            {
                question: "더 못 견디는 상황은?",
                optionA: "매일 아침 샴푸 거품 낸 상태에서 정전되기",
                optionB: "매일 밤 자기 전 양치했는데 맛있는 야식 배달오기",
                countA: 0,
                countB: 0
            },
            {
                question: "더 수치스러운 상황은?",
                optionA: "전국민 앞에서 넘어지는 모습 뉴스에 박제당하기",
                optionB: "전국민 앞에서 바지 지퍼 열린 채로 1시간 연설하기",
                countA: 0,
                countB: 0
            },
            {
                question: "언제로든 갈 수 있다면?",
                optionA: "과거로 돌아가서 실수 바로잡기",
                optionB: "미래로 가서 로또 번호만 알아오기",
                countA: 0,
                countB: 0
            },
            {
                question: "더 괴로운 상황은?",
                optionA: "립 놓고 외출하기",
                optionB: "썬크림 안 바르고 베이스하기",
                countA: 0,
                countB: 0
            },
            {
                question: "더 화나는 상황은?",
                optionA: "막 외출했는데 머리에 새똥 맞기",
                optionB: "아끼는 신발 신고 나왔는데 개똥 밟기",
                countA: 0,
                countB: 0
            },
            {
                question: "더 가기 싫은 곳은?",
                optionA: "X의 결혼식, 내가 축가",
                optionB: "회사 워크숍인데 나만 장기자랑 필참",
                countA: 0,
                countB: 0
            },
            {
                question: "정말 피하고 싶은 상황은?",
                optionA: "전혀 모르는 사람 100명 있는 파티에서 노래하기",
                optionB: "헤어진 지 일주일 된 연인과 같이 가는 동반 커플 모임",
                countA: 0,
                countB: 0
            },
            {
                question: "평생 하나만 선택해야 한다면?",
                optionA: "여름에 에어컨 없이 살기",
                optionB: "겨울에 히터 없이 살기",
                countA: 0,
                countB: 0
            },

        ];

        let currentIndex = 0;

        /* Slide 24 - JavaScript 로직 */
        const questionText = document.querySelector("#question-text");
        const btnA = document.querySelector("#btn-a");
        const btnB = document.querySelector("#btn-b");
        const result = document.querySelector("#result");
        const nextBtn = document.querySelector("#next-btn");

        // 질문을 화면에 표시하는 함수
        function showQuestion() {
            const current = questions[currentIndex];
            questionText.textContent = current.question;
            btnA.textContent = current.optionA;
            btnB.textContent = current.optionB;
            
            // 결과와 다음 버튼 숨기기
            result.classList.add("hidden");
            nextBtn.classList.add("hidden");
            // 선택 버튼 다시 보이기
            document.querySelector(".options").classList.remove("hidden");
        }

        // 투표 처리 함수
        function vote(choice) {
            const current = questions[currentIndex];
            if (choice === "A") {
                current.countA++;
            } else {
                current.countB++;
            }

            const total = current.countA + current.countB;
            const percentA = Math.round((current.countA / total) * 100);
            const percentB = 100 - percentA;

            result.textContent = `${current.optionA} ${percentA}% vs ${current.optionB} ${percentB}%`;
            
            result.classList.remove("hidden");
            nextBtn.classList.remove("hidden");
        }

        // 이벤트 리스너 연결
        btnA.addEventListener("click", function() { vote("A"); });
        btnB.addEventListener("click", function() { vote("B"); });

        nextBtn.addEventListener("click", function() {
            currentIndex++;
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                questionText.textContent = "모든 질문이 끝났습니다!";
                document.querySelector(".options").classList.add("hidden");
                result.classList.add("hidden");
                nextBtn.classList.add("hidden");
            }
        });

        // 앱 시작 시 첫 번째 질문 표시
        showQuestion();
    </script>
</body>
</html>
